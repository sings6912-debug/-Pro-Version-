<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ប្រព័ន្ធគ្រប់គ្រងហិរញ្ញវត្ថុ Pro Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Kantumruy Pro', sans-serif; background-color: #f1f5f9; }
        .modal-overlay { background-color: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen">
    <div id="licenseModalOverlay" class="fixed inset-0 z-[150] flex flex-col items-center justify-center p-4 text-white modal-overlay">
        <div class="max-w-md w-full bg-slate-900 border border-slate-700 rounded-3xl p-8 shadow-2xl text-center">
            <div class="w-20 h-20 bg-blue-600/20 rounded-full flex items-center justify-center mx-auto mb-4 text-blue-400 text-3xl">
                <i class="fa-solid fa-key"></i>
            </div>
            <h2 class="text-2xl font-black mb-2">បញ្ចូលកូដអាជ្ញាប័ណ្ណ</h2>
            <p class="text-xs text-slate-300 mb-6">សូមបញ្ចូលកូដដើម្បីចូលប្រើប្រាស់។</p>
            <input type="text" id="licenseKeyInput" placeholder="ឧ. PRO-001" class="w-full bg-slate-800 border border-slate-600 rounded-xl px-4 py-3 text-center text-lg font-bold text-amber-300 mb-4 uppercase">
            <button onclick="activateLicenseKey()" class="w-full py-3 bg-blue-600 text-white rounded-xl font-extrabold hover:bg-blue-500 transition">ផ្ទៀងផ្ទាត់</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBo9Wq8tNJ5UC0HULZaH2TjZDa6oBEQtl0",
            databaseURL: "https://my-finance-app-531c4-default-rtdb.firebaseio.com",
            projectId: "my-finance-app-531c4"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.activateLicenseKey = function() {
            const key = document.getElementById('licenseKeyInput').value.trim().toUpperCase();
            if (!key) return alert('សូមបញ្ចូល Key!');
            get(ref(db, 'licenses/' + key)).then((snapshot) => {
                if (snapshot.exists()) {
                    localStorage.setItem('finance_app_license_key', key);
                    location.reload();
                } else { alert("Key មិនត្រឹមត្រូវ!"); }
            });
        };
        
        // Check if already logged in
        if (localStorage.getItem('finance_app_license_key')) {
            document.getElementById('licenseModalOverlay').classList.add('hidden');
        }
    </script>
</body>
</html>
