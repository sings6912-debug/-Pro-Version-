<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - គ្រប់គ្រង License</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
    <div class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-lg border border-amber-300">
        <h2 class="text-xl font-bold mb-4 text-amber-700">👑 បង្កើត License Key</h2>
        <input type="text" id="adminNewKey" placeholder="ឈ្មោះ Key (ឧ. VIP-01)" class="w-full border p-2 rounded mb-3 uppercase">
        <select id="adminDuration" class="w-full border p-2 rounded mb-3">
            <option value="1">១ ខែ</option>
            <option value="12">១ ឆ្នាំ</option>
            <option value="999">រហូត (Lifetime)</option>
        </select>
        <button onclick="adminGenerateKey()" class="w-full bg-blue-600 text-white py-2 rounded font-bold hover:bg-blue-700">Save ចូល Cloud</button>
        <a href="index.html" class="block text-center mt-4 text-gray-500 underline">ត្រឡប់ទៅ App ចាស់</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyBo9Wq8tNJ5UC0HULZaH2TjZDa6oBEQtl0",
            databaseURL: "https://my-finance-app-531c4-default-rtdb.firebaseio.com",
            projectId: "my-finance-app-531c4"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        window.adminGenerateKey = function() {
            const key = document.getElementById('adminNewKey').value.trim().toUpperCase();
            const duration = document.getElementById('adminDuration').value;
            if (!key) return alert('សូមដាក់ឈ្មោះ Key!');
            set(ref(db, 'licenses/' + key), { status: 'ACTIVE', expiry: duration, created: new Date().toISOString() })
                .then(() => alert('✅ បានបង្កើត Key: ' + key + ' ជោគជ័យ!'));
        };
    </script>
</body>
</html>
